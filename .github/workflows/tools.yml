name: ubuntu tools
on:
 push:
   branches: [main]

jobs:
  ubuntu-tools-job:
     runs-on: ubuntu-latest

     steps: 
       - name: checkout code
         uses: actions/checkout@v3

       - name: print pre installed tools
         run: |
         echo "docker version"
         docker --version
         echo "python version"
         python --version
         echo "node version"
         node --version
         echo "git version"
         git --version
            
   
