name: PR Check

# Trigger on pull request only
on:
  pull_request:
    types: [opened, synchronize]  # opened = new PR, synchronize = updated PR
    branches:
      - main  # only when PR targets main branch

jobs:
  pr-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print PR branch
        run: echo "PR check running for branch: ${{ github.head_ref }}"
